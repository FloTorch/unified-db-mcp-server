services:
  unified-db-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: unified-db-mcp:latest
    container_name: unified-db-mcp-server
    restart: unless-stopped
    ports:
      - "7861:7861"
    environment:
      - PORT=7861
      - HOST=0.0.0.0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7861/unified-db/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

